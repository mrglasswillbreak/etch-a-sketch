<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Etch-a-Sketch Grid</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
    }

    #container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-wrap: wrap;
      border: 2px solid black;
      touch-action: none; /* prevents scrolling while drawing on mobile */
    }

    .square {
      box-sizing: border-box;
      border: 1px solid #ddd;
      background-color: rgb(255, 255, 255);
      transition: background-color 0.2s;
    }

    #button {
			font-size: 40px;
			font-weight: bold;
      position: absolute;
      z-index: 10;
      top: 10px;
      left: 10px;
      padding: 50px 60px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <button id="button">Set Grid Size</button>
  <div id="container"></div>

  <script>
    const container = document.querySelector("#container");
    const button = document.getElementById("button");
    let gridSize = 16;

    function createGrid(size) {
      container.innerHTML = ""; // clear previous squares

      const containerWidth = container.clientWidth;
      const containerHeight = container.clientHeight;
      const squareSize = Math.floor(Math.min(containerWidth, containerHeight) / size);

      for (let i = 0; i < size * size; i++) {
        const square = document.createElement("div");
        square.classList.add("square");
        square.style.width = `${squareSize}px`;
        square.style.height = `${squareSize}px`;
        square.dataset.darkness = 0;

        // Works for mouse hover & touch
        square.addEventListener("pointerenter", () => {
          let darkness = Number(square.dataset.darkness);
          if (darkness < 10) {
            darkness += 1;
            square.dataset.darkness = darkness;
            const shade = 255 - darkness * 25.5;
            square.style.backgroundColor = `rgb(${shade}, ${shade}, ${shade})`;
          }
        });

        container.appendChild(square);
      }
    }

    // Initial grid
    createGrid(gridSize);

    button.addEventListener("click", () => {
      const newGridSize = Number(prompt("Enter Grid Size 1 - 100"));
      if (!newGridSize || newGridSize < 1 || newGridSize > 100) {
        alert("Please enter a number between 1 and 100");
        return;
      }
      gridSize = newGridSize;
      createGrid(gridSize);
    });

    // Optional: Recreate grid on window resize to fit new viewport
    window.addEventListener("resize", () => createGrid(gridSize));
  </script>
</body>
</html>
