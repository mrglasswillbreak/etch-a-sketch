<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Etch-a-Sketch</title>

<style>
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden; /* prevents scroll on touch */
  }

  #container {
    width: 100vw;
    height: 100vh;
    display: grid;
    touch-action: none; /* critical for mobile drawing */
  }

  .cell {
    background: white;
    border: 0.5px solid rgba(0,0,0,0.05);
    box-sizing: border-box;
    transition: background-color 0.08s linear;
  }

  #button {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    padding: 8px 12px;
  }
</style>
</head>

<body>

<button id="button">Set Grid Size</button>
<div id="container"></div>

<script>
const container = document.getElementById("container");
const button = document.getElementById("button");

let gridSize = 80;
let isDrawing = false;
const MAX_DARKNESS = 10;

function createGrid(size) {
  container.innerHTML = "";
  container.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
  container.style.gridTemplateRows = `repeat(${size}, 1fr)`;

  for (let i = 0; i < size * size; i++) {
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.dataset.darkness = 0;
    container.appendChild(cell);
  }
}

function paintCell(cell) {
  if (!cell || !cell.classList.contains("cell")) return;

  let darkness = Number(cell.dataset.darkness);
  if (darkness >= MAX_DARKNESS) return;

  darkness++;
  cell.dataset.darkness = darkness;

  const shade = 255 - (darkness / MAX_DARKNESS) * 255;
  cell.style.backgroundColor = `rgb(${shade}, ${shade}, ${shade})`;
}

/* ---------- Ultra Responsive Touch + Mouse Handling ---------- */

container.addEventListener("pointerdown", (e) => {
  isDrawing = true;
  paintCell(e.target);
});

container.addEventListener("pointermove", (e) => {
  if (!isDrawing) return;

  const element = document.elementFromPoint(e.clientX, e.clientY);
  paintCell(element);
});

window.addEventListener("pointerup", () => {
  isDrawing = false;
});

button.addEventListener("click", () => {
  const input = Number(prompt("Enter Grid Size (1 - 100):"));
  if (!Number.isInteger(input) || input < 1 || input > 100) {
    alert("Please enter a number between 1 and 100.");
    return;
  }
  gridSize = input;
  createGrid(gridSize);
});

createGrid(gridSize);
</script>

</body>
</html>
