<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Etch-a-Sketch Grid</title>
  <style>
    #container {
      width: 400px;
      height: 400px;
      display: flex;
      flex-wrap: wrap;
      border: 2px solid black;
    }

    .square {
      box-sizing: border-box;
      border: 1px solid #ddd;
      background-color: rgb(255, 255, 255);
      transition: background-color 0.2s;
    }
  </style>
</head>
<body>
  <button id="button">Set Grid Size</button>
  <div id="container"></div>

  <script>
    const container = document.querySelector("#container");
    const button = document.getElementById("button");
    let gridSize = 16;

    function createGrid(size) {
      container.innerHTML = ""; // clear previous squares
      const squareSize = 400 / size;

      for (let i = 0; i < size * size; i++) {
        const square = document.createElement("div");
        square.classList.add("square");
        square.style.width = `${squareSize}px`;
        square.style.height = `${squareSize}px`;

        square.dataset.darkness = 0; // track how dark this square is

        square.addEventListener("mouseover", () => {
          let darkness = Number(square.dataset.darkness);
          if (darkness < 10) {
            darkness += 1;
            square.dataset.darkness = darkness;
            const shade = 255 - darkness * 25.5; // 0 = black, 255 = white
            square.style.backgroundColor = `rgb(${shade}, ${shade}, ${shade})`;
          }
        });

        container.appendChild(square);
      }
    }

    // initial grid
    createGrid(gridSize);

    button.addEventListener("click", () => {
      const newGridSize = Number(prompt("Enter Grid Size 1 - 100"));
      if (!newGridSize || newGridSize < 1 || newGridSize > 100) {
        alert("Please enter a number between 1 and 100");
        return;
      }
      gridSize = newGridSize;
      createGrid(gridSize);
    });
  </script>
</body>
</html>
